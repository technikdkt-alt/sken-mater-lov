<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skenovanie materiálu</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body { 
    font-family: Arial; 
    padding: 20px; 
    background: #f5f5f5;
}
h2 {
    text-align: center;
}
input, button { 
    width: 100%; 
    padding: 15px; 
    margin-top: 10px; 
    font-size: 18px; 
    box-sizing: border-box;
}
button {
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
}
button:active {
    background: #0056b3;
}
video { 
    width: 100%; 
    margin-top: 20px; 
    border-radius: 6px;
}
</style>
</head>

<body>

<h2>Skenovanie materiálu</h2>

<label>Materiál:</label>
<input id="material" readonly>

<button onclick="scan('material')">Skenovať Materiál</button>

<label>Materiálové číslo:</label>
<input id="materialNumber" readonly>

<button onclick="scan('materialNumber')">Skenovať Materiálové číslo</button>

<button onclick="save()">Uložiť</button>

<video id="video"></video>

<script>
// SEM VLOŽ PRESNÚ WEB APP URL S /exec
const API_URL = "https://script.google.com/macros/s/AKfycbwkRJ1h1ExlS6izN5BnDazCRHJ0XkUPV0sryQOMtQ0829bp5CVg5-uIVLnAVtHNgzFRNQ/exec";

async function scan(field) {
    const codeReader = new ZXing.BrowserBarcodeReader();
    try {
        const result = await codeReader.decodeOnceFromVideoDevice(undefined, 'video');
        document.getElementById(field).value = result.text;
    } catch (e) {
        alert("Nepodarilo sa načítať kód");
    }
}

function save() {
    const material = document.getElementById("material").value;
    const materialNumber = document.getElementById("materialNumber").value;

    if (!material || !materialNumber) {
        alert("Najprv naskenuj oba kódy");
        return;
    }

    const data = {
        material: material,
        materialNumber: materialNumber,
        timestamp: new Date().toLocaleString("sk-SK")
    };

    fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data),
        headers: {
            "Content-Type": "application/json"
        }
    })
    .then(() => {
        // pri no-cors nevieme prečítať odpoveď, ale požiadavka odíde
        alert("Úspešne odoslané, skontroluj tabuľku");
        document.getElementById("material").value = "";
        document.getElementById("materialNumber").value = "";
    })
    .catch(err => {
        alert("Chyba komunikácie: " + err);
    });
}
</script>

</body>
</html>
