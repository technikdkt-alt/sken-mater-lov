<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skenovanie materiálu</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>

<style>
body { 
    font-family: Arial; 
    padding: 20px; 
    background: #f5f5f5;
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

.video-container {
    position: relative;
    width: 100%;
    height: 250px;
    margin-bottom: 15px;
}

video { 
    width: 100%; 
    height: 100%;
    background: #000;
    border-radius: 8px;
    object-fit: cover;
}

.scan-box {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60%;
    height: 40%;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff00;
    border-radius: 8px;
    box-shadow: 0 0 10px #00ff00;
    pointer-events: none;
}

.ready {
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { box-shadow: 0 0 10px #00ff00; }
    50% { box-shadow: 0 0 20px #00ff00; }
    100% { box-shadow: 0 0 10px #00ff00; }
}

input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 10px;
    border: 2px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

input.active {
    border: 3px solid #007bff;
    background: #eef5ff;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    font-size: 20px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
}

button:active {
    background: #0056b3;
}

.loading {
    text-align: center;
    margin: 20px 0;
    font-weight: bold;
    color: #007bff;
}
</style>
</head>

<body>

<h2>Skenovanie materiálu</h2>

<div class="video-container">
    <video id="video"></video>
    <div id="scanBox" class="scan-box ready"></div>
</div>

<button onclick="scan()">Skenovať</button>
<button onclick="captureReceipt()" style="background:#28a745;">Odfotiť príjemku</button>

<label>Materiál:</label>
<input id="material">

<label>Materiálové číslo:</label>
<input id="materialNumber">

<button onclick="save()">Uložiť</button>

<div id="loading" class="loading" style="display:none;">Spracúvam obrázok...</div>

<script>
/* Zapisovací endpoint */
const SAVE_URL = "https://script.google.com/macros/s/AKfycbwkRJ1h1ExlS6izN5BnDazCRHJ0XkUPV0sryQOMtQO829bp5CVg5-uIVLnAVtHNgzFRNQ/exec";

/* Aktívne pole */
let activeField = null;

/* Kliknutím označíš pole */
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("focus", () => {
        document.querySelectorAll("input").forEach(i => i.classList.remove("active"));
        input.classList.add("active");
        activeField = input.id;
    });
});

/* Presnejší skener */
const codeReader = new ZXing.BrowserMultiFormatReader();

/* Skenovanie do aktívneho poľa */
async function scan() {
    if (!activeField) {
        alert("Najprv klikni na pole, do ktorého chceš skenovať.");
        return;
    }

    try {
        const result = await codeReader.decodeOnceFromVideoDevice(undefined, 'video');
        document.getElementById(activeField).value = result.text;

        const box = document.getElementById("scanBox");
        box.style.borderColor = "#00ff00";
        box.style.boxShadow = "0 0 20px #00ff00";
        setTimeout(() => {
            box.style.borderColor = "#00ff00";
            box.style.boxShadow = "0 0 10px #00ff00";
        }, 300);

    } catch (e) {
        alert("Nepodarilo sa načítať kód");
    }
}

/* AI FOTENIE PRÍJEMKY - TESSERACT.JS */
async function captureReceipt() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.capture = "environment";

    input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;

        document.getElementById("loading").style.display = "block";

        try {
            console.log("Spracúvam obrázok s Tesseract.js...");
            
            const result = await Tesseract.recognize(
                file,
                'slk', // Slovak language
                { logger: m => console.log(m) }
            );

            const text = result.data.text;
            console.log("OCR text:", text);
            
            if (!text || text.trim().length === 0) {
                alert("❌ OCR nerozpoznalo žiadny text");
                document.getElementById("loading").style.display = "none";
                return;
            }

            // Hľadaj čísla
            const materialNumberMatch = text.match(/\b\d{14,16}\b/);
            const materialNumber = materialNumberMatch ? materialNumberMatch[0] : "";

            const materialMatches = text.match(/\b\d{10,12}\b/g);
            const material = materialMatches ? materialMatches[materialMatches.length - 1] : "";

            document.getElementById("materialNumber").value = materialNumber || "";
            document.getElementById("material").value = material || "";
            
            alert("✅ Úspešne načítané!\nMateriál: " + (material || "Nenájdené") + "\nČíslo: " + (materialNumber || "Nenájdené"));

        } catch (err) {
            console.error("Chyba:", err);
            alert("❌ Chyba pri spracovaní: " + err.message);
        } finally {
            document.getElementById("loading").style.display = "none";
        }
    };

    input.click();
}

/* Konverzia fotky na Base64 */
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

/* Uloženie do tabuľky */
function save() {
    const material = document.getElementById("material").value;
    const materialNumber = document.getElementById("materialNumber").value;

    if (!material || !materialNumber) {
        alert("Najprv vyplň oba údaje.");
        return;
    }

    const data = {
        material: material,
        materialNumber: materialNumber,
        timestamp: new Date().toLocaleString("sk-SK")
    };

    fetch(SAVE_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data),
        headers: { "Content-Type": "application/json" }
    })
    .then(() => {
        alert("Úspešne odoslané");
        document.getElementById("material").value = "";
        document.getElementById("materialNumber").value = "";
    })
    .catch(err => alert("Chyba komunikácie: " + err));
}
</script>

</body>
</html>
